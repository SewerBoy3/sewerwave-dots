# sewerwave-dots — Kitty terminal (Synthwave Pastel ANSI)

font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        11.0

background            #1A1626
foreground            #E8E1F5
cursor                #B79CED
cursor_text_color     #1A1626
selection_background  #3A3354
selection_foreground  #E8E1F5

# 16-color palette
color0  #1A1626
color8  #3A3354
color1  #D98C8C
color9  #D98C8C
color2  #A8D9B0
color10 #A8D9B0
color3  #E8D9A0
color11 #E8D9A0
color4  #8FD3E8
color12 #8FD3E8
color5  #B79CED
color13 #B79CED
color6  #8FD3E8
color14 #F0B8D0
color7  #9C90B5
color15 #E8E1F5

window_padding_width 8
window_margin_width  0
hide_window_decorations no
confirm_os_window_close 0

shell zsh
term xterm-256color

# Start zellij only when not already inside a session
shell_integration enabled
map ctrl+shift+t new_tab_with_cwd

# Auto-start zellij in new kitty windows (avoid nesting)
startup_session none
