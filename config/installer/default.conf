# sewerdots — configuración del instalador (referencia completa)
# Copiá secciones a config/installer/local.conf o usá ./scripts/sewer-config

[workflows]
webdev=1
gamedev=1
audio=1
webdev_antigravity=1
webdev_nodejs=1
webdev_mariadb=1
webdev_sqlite=1
gamedev_godot=1
gamedev_mesa=1
audio_lmms=1
create_workdirs=1

[system]
login_method=startx
zram_size=ram/2
zram_swappiness=180
zram_algorithm=zstd
aur_helper=auto
change_shell=1
default_editor=nano
timezone=auto

[browser]
browser=brave

[desktop]
terminal=kitty
enable_picom=1
enable_polybar=1
enable_rofi=1
enable_dunst=1
fastfetch_on_terminal=1
zellij_autostart=1
starship_prompt=1
wallpaper_regenerate=1

[i3]
gaps_inner=8
gaps_outer=4
godot_workspace=3
focus_follows_mouse=0

[polybar]
height=27
show_cpu=1
show_memory=1
show_network=1
show_pulseaudio=1
show_date=1

[picom]
corner_radius=10
shadows=1
blur=0
inactive_opacity=0.95

[audio]
pipewire_latency=balanced

[packages]
htop=1
btop=1
pavucontrol=1
imagemagick=1
zellij=1
starship=1
fastfetch=1
gum=1
lxappearance=1

[services]
networkmanager=1
pipewire=1
bluetooth=0
cups=0
avahi=0
mariadb_autostart=0

[paths]
developer_dir=~/Developer
gamedev_dir=~/GameDev
studio_dir=~/Studio

[ui]
show_banner=1
wizard_mode=hub
