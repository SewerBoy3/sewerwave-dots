; sewerwave-dots — polybar top bar (Synthwave Pastel)

[colors]
background = #cc221D33
background-alt = #221D33
foreground = #E8E1F5
muted = #9C90B5
primary = #B79CED
secondary = #8FD3E8
alert = #D98C8C
border = #3A3354

include-file = ${env:HOME}/.config/sewerdots/polybar-overrides.ini

[bar/sewerwave]
monitor = ${env:MONITOR:}
width = 100%
height = 27
offset-x = 0
offset-y = 0
radius = 0
fixed-center = true
background = ${colors.background}
foreground = ${colors.foreground}
line-size = 2
line-color = ${colors.border}
border-size = 0
padding-left = 2
padding-right = 2
module-margin-left = 1
module-margin-right = 1
font-0 = "JetBrainsMono Nerd Font:size=10;2"
font-1 = "JetBrainsMono Nerd Font:size=10;3"
modules-left = i3
modules-center = window-title
modules-right = pulseaudio network memory cpu date

[module/i3]
type = internal/i3
format = <label-state> <label-mode>
index-sort = true
wrapping-scroll = false
label-focused = %index%
label-focused-background = ${colors.background-alt}
label-focused-foreground = ${colors.primary}
label-focused-underline = ${colors.primary}
label-focused-padding = 1
label-unfocused = %index%
label-unfocused-foreground = ${colors.muted}
label-unfocused-padding = 1
label-visible = %index%
label-visible-foreground = ${colors.secondary}
label-visible-padding = 1
label-urgent = !
label-urgent-background = ${colors.alert}
label-urgent-foreground = ${colors.foreground}
label-urgent-padding = 1

[module/window-title]
type = internal/xwindow
format = <label>
format-foreground = ${colors.foreground}
label = %title:0:40:…%
label-maxlen = 40

[module/pulseaudio]
type = internal/pulseaudio
format-volume = <ramp-volume> <label-volume>
label-volume = %percentage%%
label-muted = muted
label-muted-foreground = ${colors.muted}
ramp-volume-0 = 󰕿
ramp-volume-1 = 󰖀
ramp-volume-2 = 󰕾

[module/network]
type = internal/network
interval = 3
format-connected = 󰌘 <label-connected>
format-disconnected = 󰌙 offline
label-connected = %ifname%
label-disconnected-foreground = ${colors.muted}

[module/memory]
type = internal/memory
interval = 3
format-prefix = "RAM "
format-prefix-foreground = ${colors.secondary}
label = %percentage_used%%

[module/cpu]
type = internal/cpu
interval = 3
format-prefix = "CPU "
format-prefix-foreground = ${colors.primary}
label = %percentage%%

[module/date]
type = internal/date
interval = 30
date = %H:%M  %d %b
date-foreground = ${colors.muted}

[settings]
screenchange-reload = true
pseudo-transparency = true
