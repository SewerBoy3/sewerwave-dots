# sewerwave-dots — picom compositor (lightweight, no blur)
# Backend: glx (use xrender if unstable on old integrated GPUs)

backend = "glx";
vsync = true;
use-damage = true;

fade-in-step = 0.03;
fade-out-step = 0.03;
fade-delta = 10;

shadow = true;
shadow-radius = 8;
shadow-opacity = 0.35;
shadow-offset-x = 0;
shadow-offset-y = 2;

corner-radius = 10;
rounded-corners-exclude = [
    "class_g = 'polybar'",
    "class_g = 'Polybar'",
    "window_type = 'dock'",
    "window_type = 'desktop'"
];

blur-method = "none";
# blur-method = "dual_kawase";
# blur-strength = 2;
# blur-background-frame = true;
# blur-background-fixed = true;
# blur-background-exclude = [
#     "class_g = 'polybar'",
#     "window_type = 'dock'"
# ];

inactive-opacity = 0.95;
active-opacity = 1.0;
frame-opacity = 1.0;

wintypes:
{
    tooltip = { fade = true; shadow = true; opacity = 0.95; focus = true; full-shadow = false; };
    dock = { shadow = false; clip-shadow-above = true; };
    dnd = { shadow = false; };
    popup_menu = { opacity = 0.95; };
    dropdown_menu = { opacity = 0.95; };
};
